name: Release CueDrive

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Crear el release vacío en GitHub ─────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `CueDrive ${context.ref.replace('refs/tags/', '')}`,
              body: `## CueDrive ${context.ref.replace('refs/tags/', '')}

            DJ USB Organizer — analizá, organizá y exportá tu música a USBs.

            ### Descargas / Downloads
            | Sistema | Archivo |
            |---|---|
            | macOS (x64) | \`CueDrive_*_x64.dmg\` |
            | Windows 10/11 (x64) | \`CueDrive_*_x64-setup.exe\` |

            > **macOS:** si Gatekeeper bloquea → clic derecho → Abrir.
            > **Windows:** si SmartScreen avisa → "Más información" → Ejecutar de todos modos.`,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ── Job 2: Build por plataforma ─────────────────────────────────────────────
  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build analyzer binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cd analyzer
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller \
            --onefile \
            --name "analyzer-x86_64-apple-darwin" \
            --distpath ../src-tauri/binaries \
            --hidden-import=librosa \
            --hidden-import=soundfile \
            --hidden-import=numpy \
            analyzer.py

      - name: Build analyzer binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          cd analyzer
          pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
          pyinstaller `
            --onefile `
            --name "analyzer-x86_64-pc-windows-msvc" `
            --distpath "../src-tauri/binaries" `
            --hidden-import=librosa `
            --hidden-import=soundfile `
            --hidden-import=numpy `
            analyzer.py

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and upload Tauri artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  # ── Job 3: Publicar el release (draft → published) ──────────────────────────
  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
            });
            core.info(`Published release ${release.id} for tag ${tag}`);
